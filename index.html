<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake | Premium Arcade Experience</title>
    <meta name="description" content="A premium, modern Snake game with neon aesthetics and smooth gameplay.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>NEON<span>SNAKE</span></h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">SCORE</span>
                    <span id="current-score" class="value">000</span>
                </div>
                <div class="score-item">
                    <span class="label">BEST</span>
                    <span id="high-score" class="value">000</span>
                </div>
            </div>
        </header>

        <main class="game-board-wrapper">
            <canvas id="game-canvas"></canvas>
            
            <div id="game-over-screen" class="overlay hidden">
                <div class="overlay-content">
                    <h2>GAME OVER</h2>
                    <p>Total Score: <span id="final-score">0</span></p>
                    <button id="restart-btn">PLAY AGAIN</button>
                </div>
            </div>

            <div id="start-screen" class="overlay">
                <div class="overlay-content">
                    <div class="icon">🐍</div>
                    <h2>READY?</h2>
                    <p>Use Arrow Keys or Swipe to Move</p>
                    <button id="start-btn">START GAME</button>
                </div>
            </div>
        </main>

        <footer class="game-controls">
            <div class="mobile-controls">
                <button class="ctrl-btn up" id="ctrl-up">▲</button>
                <div class="mid-ctrls">
                    <button class="ctrl-btn left" id="ctrl-left">◀</button>
                    <button class="ctrl-btn down" id="ctrl-down">▼</button>
                    <button class="ctrl-btn right" id="ctrl-right">▶</button>
                </div>
            </div>
        </footer>
        <div class="copyright">© 2024 cmru.ac.th</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
